<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>the shrine</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/district.css">
</head>
<body>
  <div class="entering-overlay" id="entering-overlay">
    <h1 class="entering-text">Entering the Shrine</h1>
  </div>

  <div class="district-content hidden" id="district-content">
    <div class="shrine-screen" id="shrine-intro">
      <div class="shrine-header">
        <button class="back-btn mono" id="back-btn">Back to the city</button>
        <h2 class="shrine-title">The Shrine: Reverence</h2>
      </div>
      <div class="shrine-prompt-container">
        <h1 class="shrine-main-prompt">Think of a place that feels sacred to you.</h1>
        <h3 class="shrine-sub-prompt">A place you hold with reverence, whether or not it's religious.</h3>
        <button class="ready-btn mono hidden" id="ready-btn">Ready?</button>
      </div>
    </div>

    <!-- questions -->
    <div class="shrine-screen hidden" id="shrine-questions">
      <div class="shrine-header">
        <button class="back-btn mono" id="questions-back-btn">Back to the city</button>
        <h2 class="shrine-title">The Shrine: Reverence</h2>
      </div>

      <div class="questions-container">
        <!-- active question card -->
        <div class="question-card">
          <div class="question-content">
            <h1 class="question-main" id="question-main"></h1>
            <h3 class="question-sub" id="question-sub"></h3>
            <textarea 
              class="question-input" 
              id="question-input" 
              placeholder="Add text here"
              rows="8"
            ></textarea>
          </div>
          <div class="question-nav">
            <button class="nav-btn mono" id="prev-btn">Back</button>
            <span class="question-progress mono" id="question-progress">1/6</span>
            <button class="nav-btn mono" id="next-btn">Next</button>
          </div>
        </div>

        <!-- previous cards -->
        <div class="stacked-cards" id="stacked-cards"></div>

        <!-- progress bar -->
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>

    <!-- confirmation screen -->
    <div class="shrine-screen hidden" id="shrine-completion">
      <div class="shrine-header">
        <h2 class="shrine-title">The Shrine (Reverence)</h2>
      </div>
      <div class="completion-container">
        <h1 class="completion-title">You've completed<br>The Shrine</h1>
        <div class="completion-place">
          <i class="fa-solid fa-location-dot location-icon"></i>
          <p class="place-name" id="completion-place-name"></p>
        </div>
        <p class="completion-tagline">is a place you respect.</p>
        <div class="completion-buttons">
          <button class="completion-btn mono" id="complete-districts-btn">Complete other districts</button>
          <button class="completion-btn mono" id="customize-btn">Customize this district</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/achievements.js"></script>
  <script src="../js/district.js"></script>
  <script src="../js/shrine.js"></script>
</body>
</html>
