<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the cornerstore</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/customize.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

  <div class="customize-layout" id="customize-layout">

    <!-- left sidebar -->
    <div class="customize-left cornerstore-left" id="customize-left">
      <div class="district-preview">

        <div class="district-image-container">
          <img src="../assets/districts/cornerstore-unlocked.png" alt="The Cornerstore" class="district-preview-img" id="district-preview-img">
        </div>

        <!-- skins — horizontal row -->
        <div class="skin-options">
          <div class="skin-thumb active" data-skin="0">
            <img src="../assets/districts/cornerstore.png" alt="Skin 1">
          </div>
          <div class="skin-thumb" data-skin="1">
            <img src="../assets/districts/cornerstore-skin2.png" alt="Skin 2">
          </div>
          <div class="skin-thumb" data-skin="2">
            <img src="../assets/districts/cornerstore-skin3.png" alt="Skin 3">
          </div>
        </div>

        <button class="sidebar-save-btn mono" id="save-btn">Save</button>

        <p class="mono district-date" id="district-date"></p>

      </div>
    </div>

    <!-- right panel -->
    <div class="customize-right" id="customize-right">

      <!-- binding header: large title | Back to City | Log Again | Share -->
      <header class="customize-header">
        <div class="customize-header-title-cell" id="title-cell">
          <h1 class="customize-header-title" id="district-title"></h1>
          <input
            class="customize-header-title-input hidden"
            id="district-title-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
          >
        </div>
        <a href="../map.html" class="customize-header-cell customize-back-btn mono">Back to City</a>
        <button class="customize-header-cell customize-header-btn mono" id="redo-btn">Log Again</button>
        <button class="customize-header-cell customize-header-btn mono" id="share-btn">Share</button>
      </header>

      <!-- location sub-header -->
      <div class="customize-subheader">
        <span class="location-line mono">Location of the cornerstore:
          <span class="location-value mono" id="location-value"></span>
        </span>
      </div>

      <!-- view toggle — boxed buttons -->
      <div class="view-toggle">
        <button class="toggle-btn mono active" id="journal-toggle">Journal View</button>
        <button class="toggle-btn mono" id="graph-toggle">Map View</button>
      </div>

      <!-- journal view -->
      <div class="journal-view" id="journal-view">
        <div class="journal-entries" id="journal-entries"></div>
      </div>

      <!-- constellation view -->
      <div class="graph-view hidden" id="graph-view">
        <div id="p5-canvas-container"></div>
      </div>

    </div>
  </div>

  <script src="../js/achievements.js"></script>
  <script src="../js/customize.js"></script>

</body>
</html>
