<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the garden customize</title>      
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/customize.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

  <!-- Main Layout -->
  <div class="customize-layout" id="customize-layout">

    <!-- Left Sidebar -->
    <div class="customize-left garden-left" id="customize-left">
      <div class="district-preview">
        <div class="district-image-container">
          <img src="../assets/districts/garden.png" alt="Garden" class="district-preview-img" id="district-preview-img">  
        </div>
        <div class="skin-options">
          <div class="skin-thumb active" data-skin="0">
            <img src="../assets/districts/garden.png" alt="Skin 1">
          </div>
          <div class="skin-thumb" data-skin="1">
            <img src="../assets/districts/garden-skin2.png" alt="Skin 2">
          </div>
          <div class="skin-thumb" data-skin="2">
            <img src="../assets/districts/garden-skin3.png" alt="Skin 3">
          </div>
        </div>
        <p class="mono district-date" id="district-date"></p>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="customize-right" id="customize-right">
      <div class="right-header">
        <button class="right-back-btn mono" id="right-back-btn">← Back to the city</button>
        <div class="right-header-top">
          <h1 class="district-title" id="district-title"></h1>
          <button class="icon-btn mono" id="edit-name-btn">&#9998;</button>
          <button class="icon-btn mono" id="redo-btn">&#8635; Log again</button>
        </div>
        <p class="mono location-line">
          Location of the Garden:                <!-- 5. CHANGE: district name -->
          <span class="serif location-value" id="location-value"></span>
        </p>
      </div>

      <!-- View Toggle -->
      <div class="view-toggle">
        <button class="toggle-btn mono active" id="journal-toggle">Journal</button>
        <button class="toggle-btn mono" id="graph-toggle">Map</button>
        <button class="toggle-btn mono" id="save-btn">Save</button>
      </div>

      <!-- Journal View -->
      <div class="journal-view" id="journal-view">
        <div class="journal-entries" id="journal-entries">
        </div>
      </div>

      <!-- Graph / Constellation View -->
      <div class="graph-view hidden" id="graph-view">
        <div id="p5-canvas-container"></div>
      </div>

    </div>
  </div>

  <!-- Edit Name Overlay -->
  <div class="overlay" id="edit-name-overlay">
    <div class="overlay-content">
      <h2>Rename your Garden</h2>              <!-- 6. CHANGE: district name -->
      <input type="text" class="city-name-input" id="new-name-input" placeholder="Enter a name">
      <div class="overlay-buttons">
        <button class="overlay-btn mono" id="cancel-rename-btn">Cancel</button>
        <button class="overlay-btn mono primary" id="save-rename-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="../js/achievements.js"></script>
  <script src="../js/customize.js"></script>
</body>
</html>
